services:
  migrate:
    build: .
    command: npm run db:migrate
    environment:
      DATABASE_URL: file:/data/app.db
      SITEMAP_INDEX_URL: ${SITEMAP_INDEX_URL:-https://www.adapostcanincraiova.ro/sitemap_index.xml}
      SHELTERS_JSON: ${SHELTERS_JSON:-}
      SYNC_CRON: ${SYNC_CRON:-0 7 * * *}
      SYNC_TIMEZONE: ${SYNC_TIMEZONE:-Europe/Bucharest}
    volumes:
      - paws_data:/data

  web:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: file:/data/app.db
      SITEMAP_INDEX_URL: ${SITEMAP_INDEX_URL:-https://www.adapostcanincraiova.ro/sitemap_index.xml}
      SHELTERS_JSON: ${SHELTERS_JSON:-}
      SYNC_CRON: ${SYNC_CRON:-0 7 * * *}
      SYNC_TIMEZONE: ${SYNC_TIMEZONE:-Europe/Bucharest}
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - paws_data:/data

  sync:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: npm run cron
    environment:
      DATABASE_URL: file:/data/app.db
      SITEMAP_INDEX_URL: ${SITEMAP_INDEX_URL:-https://www.adapostcanincraiova.ro/sitemap_index.xml}
      SHELTERS_JSON: ${SHELTERS_JSON:-}
      SYNC_CRON: ${SYNC_CRON:-0 7 * * *}
      SYNC_TIMEZONE: ${SYNC_TIMEZONE:-Europe/Bucharest}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      PROFILE_BATCH_SIZE: ${PROFILE_BATCH_SIZE:-50}
    restart: unless-stopped
    volumes:
      - paws_data:/data

  prisma-studio:
    build: .
    command: npx prisma studio --hostname 0.0.0.0 --port 5555
    ports:
      - "${PRISMA_STUDIO_PORT:-3077}:5555"
    env_file:
      - .env
    volumes:
      - paws_data:/app/data
    profiles:
      - tools
    restart: unless-stopped

volumes:
  paws_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PAWS_DATA_PATH:-}

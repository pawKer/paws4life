services:
  migrate:
    build: .
    command: npm run db:migrate
    environment:
      DATABASE_URL: file:/data/app.db
      SITEMAP_INDEX_URL: ${SITEMAP_INDEX_URL:-https://www.adapostcanincraiova.ro/sitemap_index.xml}
      SHELTERS_JSON: ${SHELTERS_JSON:-}
      SYNC_CRON: ${SYNC_CRON:-0 7 * * *}
      SYNC_TIMEZONE: ${SYNC_TIMEZONE:-Europe/Bucharest}
    volumes:
      - ${PAWS_DATA_PATH:-}:/data

  web:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: file:/data/app.db
      SITEMAP_INDEX_URL: ${SITEMAP_INDEX_URL:-https://www.adapostcanincraiova.ro/sitemap_index.xml}
      SHELTERS_JSON: ${SHELTERS_JSON:-}
      SYNC_CRON: ${SYNC_CRON:-0 7 * * *}
      SYNC_TIMEZONE: ${SYNC_TIMEZONE:-Europe/Bucharest}
    ports:
      - "3070:3000"
    restart: unless-stopped
    volumes:
      - ${PAWS_DATA_PATH:-}:/data

  sync:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: npm run cron
    environment:
      DATABASE_URL: file:/data/app.db
      SITEMAP_INDEX_URL: ${SITEMAP_INDEX_URL:-https://www.adapostcanincraiova.ro/sitemap_index.xml}
      SHELTERS_JSON: ${SHELTERS_JSON:-}
      SYNC_CRON: ${SYNC_CRON:-0 7 * * *}
      SYNC_TIMEZONE: ${SYNC_TIMEZONE:-Europe/Bucharest}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      PROFILE_BATCH_SIZE: ${PROFILE_BATCH_SIZE:-50}
    restart: unless-stopped
    volumes:
      - ${PAWS_DATA_PATH:-}:/data

  # One-shot AI profile regeneration against the current SQLite DB.
  # Run explicitly with:
  # docker compose --profile regenerate run --rm regenerate-profiles
  regenerate-profiles:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: npm run profiles:regenerate
    environment:
      DATABASE_URL: file:/data/app.db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      OPENAI_RESPONSES_URL: ${OPENAI_RESPONSES_URL:-https://api.openai.com/v1/responses}
      PROFILE_BATCH_SIZE: ${PROFILE_BATCH_SIZE:-50}
      PROFILE_LOG_IO: ${PROFILE_LOG_IO:-false}
      PROFILE_REGENERATE_NAMES: ${PROFILE_REGENERATE_NAMES:-replace}
      SHELTER_SLUG: ${SHELTER_SLUG:-}
    profiles:
      - regenerate
    volumes:
      - ${PAWS_DATA_PATH:-}:/data

  prisma-studio:
    build: .
    command: npx prisma studio --hostname 0.0.0.0 --port 5555
    ports:
      - "3077:5555"
    environment:
      DATABASE_URL: file:/data/app.db
    env_file:
      - .env
    volumes:
      - ${PAWS_DATA_PATH:-}:/data
    profiles:
      - tools
    restart: unless-stopped
